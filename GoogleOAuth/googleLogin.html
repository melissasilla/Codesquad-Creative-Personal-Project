<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google OAuth 2.0 Login</title>


    //add this line to home
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    //add this to home
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif;">
        <h2>Login to Your Account</h2> //remove line

        <div id="googleSignInButton"></div>

        <div id="userProfile" style="margin-top: 20px; display: none; text-align: center;">
            <img id="userAvatar" src="" alt="Avatar" style="border-radius: 50%; width: 80px;">
            <h3 id="userName"></h3>
            <p id="userEmail"></p>
        </div>
    </div>

// add this script tag to home.html
    <script>
        window.onload = function () {
            // FIXED: Make sure to replace this with your actual full Client ID
            google.accounts.id.initialize({
                client_id: "962888758021-tfoiupdvst62ilnp5vrehosc729i9o8r.apps.googleusercontent.com", 
                callback: handleCredentialResponse 
            });

            // Render the official button inside our target container
            google.accounts.id.renderButton(
                document.getElementById("googleSignInButton"),
                { theme: "outline", size: "large", type: "standard", text: "signin_with" }
            );

            // Optional: Displays the One-Tap prompt overlay
            google.accounts.id.prompt();
        };

        // This handles the secure token sent back from Google
        async function handleCredentialResponse(response) {
            const idToken = response.credential; 

            try {
                const res = await fetch("http://localhost:5000/api/auth/google", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: idToken })
                });

                const data = await res.json();

                if (res.ok) {
                    console.log("Authentication successful!", data.user);

                    document.getElementById("googleSignInButton").style.display = "none";
                    document.getElementById("userAvatar").src = data.user.picture;
                    document.getElementById("userName").innerText = `Welcome, ${data.user.name}`;
                    document.getElementById("userEmail").innerText = data.user.email;
                    document.getElementById("userProfile").style.display = "block";
                } else {
                    alert("Authentication failed: " + data.message);
                }
            } catch (error) {
                console.error("Network error during auth:", error);
                alert("Could not connect to the backend authentication server.");
            }
        }
    </script>
</body>
</html>
